<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Routine Bien-être</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dekko&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    :root {
      --sky-blue: #85c7f2; --sunflower-gold: #fabc3c;
      --powder-blush: #f4afab; --light-green: #9ee493;
      --vibrant-coral: #fe5f55; --police: "Dekko", cursive;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--police);
      background: linear-gradient(135deg, #fe5f55 0%, #f4afab 50%, #fabc3c 100%);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    h1 { font-size: 2.8rem; color: #fff; text-shadow: 2px 3px 0 rgba(0,0,0,0.12); margin-bottom: 0.4rem; }
    .sous-titre { font-size: 1.2rem; color: rgba(255,255,255,0.85); margin-bottom: 2.5rem; text-align: center; }
    .hero { text-align: center; margin-bottom: 1.5rem; }
    .boutons { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.8rem; }
    .btn {
      font-family: var(--police); font-size: 1.15rem;
      padding: 16px 36px; border: none; border-radius: 50px;
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 0.5rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease; font-weight: bold;
    }
    .btn:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.22); }
    .btn:active { transform: translateY(1px); }
    .btn-bleu  { background: var(--sky-blue);      color: #1a3a52; }
    .btn-jaune { background: var(--sunflower-gold); color: #5a3a00; }
    .btn-rose  { background: var(--powder-blush);  color: #7a2020; }
    .btn-vert  { background: var(--light-green);   color: #1a4a12; }
    #message { font-size: 1.1rem; color: rgba(255,255,255,0.9); min-height: 1.5rem; text-align: center; }
    .cards { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 2rem; max-width: 700px; }
    .card-mini {
      background: rgba(255,255,255,0.25); border-radius: 16px;
      padding: 0.8rem 1.2rem; color: #fff; font-size: 0.95rem;
      backdrop-filter: blur(4px); cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .card-mini:hover { transform: scale(1.05); background: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="hero">
    <svg width="140" height="140" viewBox="0 0 140 140" fill="none">
      <circle cx="70" cy="35" r="22" fill="#fff" opacity="0.9"/>
      <circle cx="63" cy="32" r="3" fill="#fe5f55"/>
      <circle cx="77" cy="32" r="3" fill="#fe5f55"/>
      <path d="M63 42 Q70 48 77 42" stroke="#fe5f55" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <rect x="54" y="57" width="32" height="36" rx="10" fill="#fff" opacity="0.85"/>
      <line x1="54" y1="65" x2="34" y2="80" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <line x1="86" y1="65" x2="106" y2="80" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <line x1="63" y1="93" x2="55" y2="120" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <line x1="77" y1="93" x2="85" y2="120" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <text x="10" y="30" font-size="16">✨</text>
      <text x="108" y="30" font-size="16">⭐</text>
    </svg>
    <h1>Ma Routine Bien-être</h1>
    <p class="sous-titre">Choisis une catégorie pour découvrir des conseils !</p>
  </div>
  <div class="boutons">
    <a href="dormir.html"     class="btn btn-bleu" >😴 Dormir</a>
    <a href="manger.html"     class="btn btn-jaune">🍽️ Manger</a>
    <a href="travailler.html" class="btn btn-rose" >💼 Travailler</a>
    <a href="entrainer.html"  class="btn btn-vert" >🏋️ S'entraîner</a>
  </div>
  <p id="message">Clique sur le bouton qui te correspond !</p>
  <div class="cards">
    <div class="card-mini">😴 7–9h de sommeil</div>
    <div class="card-mini">🥗 5 fruits & légumes</div>
    <div class="card-mini">💧 1,5L d'eau / jour</div>
    <div class="card-mini">🏃 30 min de sport</div>
    <div class="card-mini">📵 Moins d'écrans le soir</div>
  </div>
  <script>
    $(".btn").click(function(e) {
      e.preventDefault();
      const url = $(this).attr("href");
      $("#message").fadeOut(150, function() { $(this).text("Chargement...").fadeIn(200); });
      $(this).animate({ marginTop: "-8px" }, 100).animate({ marginTop: "0px" }, 150, function() {
        window.location.href = url;
      });
    });
  </script>
</body>
</html>
